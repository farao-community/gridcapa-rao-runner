spring:
  rabbitmq:
    host: rabbitmq-server
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

minio-adapter:
  # TODO Don't forget to re-adapt values for the tests
  access-key: gridcapa
  secret-key: gridcapa
  url: http://172.18.0.2:9000
  bucket: gridcapa
  base-path: RAO_TEST

rao-runner:
  with-interruption-server: true
  messages:
    rao-request:
      queue-name: raoi-request-queue
      delivery-limit: 2
    rao-response:
      exchange: raoi-response
      expiration: 60000
  url:
    whitelist:
      - http://localhost:9000
      - file:/
    interrupt-server-url: http://testUrl/interrupted/
